name: Build Basic Image

on:
  push:
    branches:
      - master
      - develop
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-image:
    runs-on: ubuntu-22.04
    outputs:
      asset_name: ${{ steps.meta.outputs.asset_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
      source_branch: ${{ steps.meta.outputs.source_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate shell scripts
        run: |
          for script in \
            packaging/pi-gen/basic/stage-whisplay/prerun.sh \
            packaging/pi-gen/basic/stage-whisplay/01-whisplay/00-run.sh \
            packaging/pi-gen/basic/stage-whisplay/01-whisplay/00-run-chroot.sh \
            packaging/pi-gen/basic/stage-whisplay/files/install-sugar-wifi-conf.sh \
            packaging/pi-gen/basic/stage-whisplay/files/install-whisplay-driver.sh \
            packaging/pi-gen/basic/stage-whisplay/files/install-whisplay-u-boot.sh \
            packaging/pi-gen/basic/stage-whisplay/files/expand-rootfs-firstboot.sh \
            packaging/pi-gen/basic/stage-whisplay/files/provision-basic.sh
          do
            bash -n "$script"
          done

      - name: Set release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_name="${GITHUB_REF_NAME}"
            asset_name="whisplay-basic.img.xz"
            prerelease="false"
            source_ref="${GITHUB_REF_NAME}"
            source_branch=""
          else
            branch_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/[:space:]' '-' | tr -cd '[:alnum:]._-')"
            release_tag="${branch_slug}-latest"
            release_name="${branch_slug}-latest"
            asset_name="whisplay-basic.img.xz"
            prerelease="true"
            source_ref="${GITHUB_REF_NAME}"
            source_branch="${GITHUB_REF_NAME}"
          fi

          {
            echo "release_tag=$release_tag"
            echo "release_name=$release_name"
            echo "asset_name=$asset_name"
            echo "prerelease=$prerelease"
            echo "source_ref=$source_ref"
            echo "source_branch=$source_branch"
          } >> "$GITHUB_OUTPUT"

      - name: Free runner disk space
        run: |
          set -euxo pipefail
          echo "Disk usage before cleanup:"
          df -h

          sudo rm -rf \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/share/chromium \
            /usr/share/dotnet \
            /usr/share/miniconda \
            /usr/share/swift \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache \
            /opt/az

          sudo docker system prune -af --volumes || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "Disk usage after cleanup:"
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binfmt-support \
            bmap-tools \
            qemu-user-static \
            xz-utils

      - name: Register qemu-aarch64 for binfmt_misc
        run: |
          qemu_static="$(command -v qemu-aarch64-static)"
          sudo ln -sf "$qemu_static" /usr/local/bin/qemu-aarch64
          command -v qemu-aarch64
          command -v qemu-aarch64-static
          sudo mount binfmt_misc -t binfmt_misc /proc/sys/fs/binfmt_misc || true
          sudo update-binfmts --import qemu-aarch64 || true
          sudo update-binfmts --enable qemu-aarch64 || true
          test -f /proc/sys/fs/binfmt_misc/qemu-aarch64
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64

      - name: Checkout pi-gen arm64
        uses: actions/checkout@v4
        with:
          repository: RPi-Distro/pi-gen
          ref: arm64
          path: pi-gen

      - name: Prepare pi-gen customization
        env:
          WHISPLAY_RELEASE_VERSION: ${{ steps.meta.outputs.release_name }}
          WHISPLAY_SOURCE_REF: ${{ steps.meta.outputs.source_ref }}
        run: |
          cp -R packaging/pi-gen/basic/stage-whisplay pi-gen/stage-whisplay
          chmod +x \
            pi-gen/stage-whisplay/prerun.sh \
            pi-gen/stage-whisplay/01-whisplay/00-run.sh \
            pi-gen/stage-whisplay/01-whisplay/00-run-chroot.sh \
            pi-gen/stage-whisplay/files/install-sugar-wifi-conf.sh \
            pi-gen/stage-whisplay/files/install-whisplay-driver.sh \
            pi-gen/stage-whisplay/files/install-whisplay-u-boot.sh \
            pi-gen/stage-whisplay/files/expand-rootfs-firstboot.sh \
            pi-gen/stage-whisplay/files/provision-basic.sh
          touch pi-gen/stage2/SKIP_IMAGES
          touch pi-gen/stage3/SKIP_IMAGES
          cat packaging/pi-gen/basic/pi-gen.env > pi-gen/config
          {
            echo "WHISPLAY_CHATBOT_REPO=https://github.com/${GITHUB_REPOSITORY}.git"
            echo "WHISPLAY_CHATBOT_REF=${WHISPLAY_SOURCE_REF}"
            echo "WHISPLAY_RELEASE_VERSION=${WHISPLAY_RELEASE_VERSION}"
          } >> pi-gen/config
          grep -n "install_networkmanager_polkit_rule\\|49-whisplay-networkmanager" pi-gen/stage-whisplay/files/provision-basic.sh

      - name: Build image with pi-gen
        working-directory: pi-gen
        run: sudo ./build-docker.sh

      - name: Prepare release assets
        env:
          ASSET_NAME: ${{ steps.meta.outputs.asset_name }}
        run: |
          set -euo pipefail
          deploy_dir="pi-gen/deploy"
          echo "Deploy directory contents:"
          find "$deploy_dir" -maxdepth 1 -type f | sort
          raw_img="$(find "$deploy_dir" -maxdepth 1 -type f -name '*.img' -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2- || true)"
          compressed_img="$(find "$deploy_dir" -maxdepth 1 -type f -name '*.img.xz' -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2- || true)"

          if [ -z "$compressed_img" ]; then
            echo "No compressed image found in $deploy_dir" >&2
            exit 1
          fi

          if [ -n "$raw_img" ] && [ ! -f "$raw_img" ]; then
            echo "Ignoring invalid raw image path: $raw_img"
            raw_img=""
          fi

          if [ -n "$raw_img" ] && command -v bmaptool >/dev/null 2>&1; then
            bmaptool create -o "${raw_img}.bmap" "$raw_img"
          fi

          mkdir -p release-assets
          cp "$compressed_img" "release-assets/${ASSET_NAME}"
          (cd release-assets && sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256")

          if [ -n "$raw_img" ] && [ -f "${raw_img}.bmap" ]; then
            cp "${raw_img}.bmap" "release-assets/${ASSET_NAME%.xz}.bmap"
          fi

          if [ -n "$raw_img" ]; then
            rm -f "$raw_img" "${raw_img}.bmap"
          fi

      - name: Free pi-gen workspace
        run: |
          set -euxo pipefail
          sudo rm -rf pi-gen/work
          sudo docker system prune -af --volumes || true
          df -h

      - name: Inspect image contents
        env:
          ASSET_NAME: ${{ steps.meta.outputs.asset_name }}
        run: |
          set -euo pipefail
          asset="release-assets/${ASSET_NAME}"
          rm -f "${asset%.xz}"
          xz -dk "$asset"
          raw_img="${asset%.xz}"
          loopdev="$(sudo losetup --find --show --partscan "$raw_img")"
          cleanup() {
            sudo umount /mnt/whisplay-boot >/dev/null 2>&1 || true
            sudo umount /mnt/whisplay-root >/dev/null 2>&1 || true
            sudo losetup -d "$loopdev" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          echo "Loop device: $loopdev"
          sudo lsblk "$loopdev"
          root_part="$(sudo lsblk -lnpo NAME,TYPE "$loopdev" | awk '$2 == "part" { print $1 }' | sed -n '2p')"
          boot_part="$(sudo lsblk -lnpo NAME,TYPE "$loopdev" | awk '$2 == "part" { print $1 }' | sed -n '1p')"
          if [ -z "$root_part" ]; then
            echo "Could not detect root partition on $loopdev" >&2
            sudo fdisk -l "$raw_img" || true
            exit 1
          fi
          if [ -z "$boot_part" ]; then
            echo "Could not detect boot partition on $loopdev" >&2
            sudo fdisk -l "$raw_img" || true
            exit 1
          fi

          sudo mkdir -p /mnt/whisplay-root
          sudo mount -o ro "$root_part" /mnt/whisplay-root
          sudo mkdir -p /mnt/whisplay-boot
          sudo mount -o ro "$boot_part" /mnt/whisplay-boot

          check_file() {
            local path="$1"
            if [ ! -e "/mnt/whisplay-root${path}" ]; then
              echo "Missing expected path: ${path}" >&2
              return 1
            fi
          }

          check_file /etc/systemd/system/chatbot.service || exit 1
          check_file /etc/systemd/system/whisplay-daemon.service || exit 1
          check_file /etc/systemd/system/whisplay-chatbot-register.service || exit 1
          check_file /etc/systemd/system/whisplay-expand-rootfs.service || exit 1
          check_file /usr/local/sbin/whisplay-expand-rootfs || exit 1
          check_file /etc/whisplay-image/basic-release || exit 1
          check_file /etc/whisplay-image/u-boot-release || exit 1
          check_file /etc/cloud/cloud.cfg || exit 1
          check_file /usr/bin/nmcli || exit 1
          check_file /etc/polkit-1/rules.d/49-whisplay-networkmanager.rules || exit 1
          check_file /etc/asound.conf || exit 1
          check_file /etc/systemd/system/whisplay-soundcard-warmup.service || exit 1

          check_boot_file() {
            local path="$1"
            if [ ! -e "/mnt/whisplay-boot${path}" ]; then
              echo "Missing expected boot path: ${path}" >&2
              return 1
            fi
          }
          check_boot_file /u-boot-whisplay-rpi-arm64.bin || exit 1
          check_boot_file /logo_lcd_240_280_rgb565.bmp || exit 1
          check_boot_file /config.txt || exit 1

          if ! sudo grep -qxF 'enable_uart=1' /mnt/whisplay-boot/config.txt; then
            echo "config.txt is missing enable_uart=1" >&2
            sudo cat /mnt/whisplay-boot/config.txt >&2
            exit 1
          fi
          if ! sudo grep -qxF 'uart_2ndstage=1' /mnt/whisplay-boot/config.txt; then
            echo "config.txt is missing uart_2ndstage=1" >&2
            sudo cat /mnt/whisplay-boot/config.txt >&2
            exit 1
          fi
          if ! sudo grep -qxF 'kernel=u-boot-whisplay-rpi-arm64.bin' /mnt/whisplay-boot/config.txt; then
            echo "config.txt is missing Whisplay U-Boot kernel setting" >&2
            sudo cat /mnt/whisplay-boot/config.txt >&2
            exit 1
          fi
          if ! sudo grep -qxF 'dtoverlay=whisplay-soundcard' /mnt/whisplay-boot/config.txt; then
            echo "config.txt is missing unified Whisplay sound card overlay" >&2
            sudo cat /mnt/whisplay-boot/config.txt >&2
            exit 1
          fi
          if sudo grep -qxF 'dtoverlay=wm8960-soundcard' /mnt/whisplay-boot/config.txt; then
            echo "config.txt still enables the legacy WM8960 sound card overlay" >&2
            sudo cat /mnt/whisplay-boot/config.txt >&2
            exit 1
          fi
          if ! sudo grep -q 'whisplaysound' /mnt/whisplay-root/etc/asound.conf; then
            echo "/etc/asound.conf does not route audio through whisplaysound" >&2
            sudo cat /mnt/whisplay-root/etc/asound.conf >&2
            exit 1
          fi
          whisplay_kernel_releases="$(sudo find /mnt/whisplay-root/lib/modules -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -V)"
          if [ -z "$whisplay_kernel_releases" ]; then
            echo "No kernel module directories found in image" >&2
            sudo find /mnt/whisplay-root/lib/modules -mindepth 1 -maxdepth 2 -print >&2 || true
            exit 1
          fi
          while IFS= read -r kernel_release; do
            [ -n "$kernel_release" ] || continue
            module_path="/mnt/whisplay-root/lib/modules/${kernel_release}/kernel/sound/soc/codecs/snd-soc-whisplay-soundcard.ko"
            if ! sudo test -f "$module_path"; then
              echo "Unified Whisplay sound card kernel module is missing for ${kernel_release}" >&2
              sudo find "/mnt/whisplay-root/lib/modules/${kernel_release}" -maxdepth 6 -type f -name '*whisplay*' -print >&2 || true
              exit 1
            fi
            if ! sudo grep -q 'snd-soc-whisplay-soundcard.ko' "/mnt/whisplay-root/lib/modules/${kernel_release}/modules.dep"; then
              echo "modules.dep does not include the Whisplay sound card module for ${kernel_release}" >&2
              sudo grep -n 'whisplay' "/mnt/whisplay-root/lib/modules/${kernel_release}/modules.dep" >&2 || true
              exit 1
            fi
          done <<< "$whisplay_kernel_releases"
          if [ -L /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants/whisplay-soundcard-warmup.service ] || [ -e /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants/whisplay-soundcard-warmup.service ]; then
            true
          else
            echo "whisplay-soundcard-warmup.service is not enabled in the image" >&2
            sudo ls -la /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants || true
            exit 1
          fi
          if [ -L /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants/wm8960-soundcard.service ] || [ -e /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants/wm8960-soundcard.service ]; then
            echo "Legacy wm8960-soundcard.service is still enabled in the image" >&2
            sudo ls -la /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants >&2 || true
            exit 1
          fi

          chatbot_exec_path_raw="$(sudo awk -F= '
            $1 == "ExecStart" {
              gsub(/\r$/, "", $2);
              sub(/^\/bin\/bash[[:space:]]+/, "", $2);
              print $2;
              exit;
            }
          ' /mnt/whisplay-root/etc/systemd/system/chatbot.service)"
          chatbot_exec_path="$(printf '%s' "$chatbot_exec_path_raw" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/^"//' -e 's/"$//')"

          if [ -z "$chatbot_exec_path" ] || ! echo "$chatbot_exec_path" | grep -q "run_chatbot.sh"; then
            echo "chatbot.service does not contain a valid run_chatbot.sh ExecStart" >&2
            echo "Raw parsed ExecStart path: ${chatbot_exec_path_raw:-<empty>}" >&2
            echo "Normalized ExecStart path: ${chatbot_exec_path:-<empty>}" >&2
            sudo cat /mnt/whisplay-root/etc/systemd/system/chatbot.service >&2
            exit 1
          fi

          printf 'Resolved chatbot ExecStart path (normalized): [%q]\n' "$chatbot_exec_path"
          if [ -z "$chatbot_exec_path" ] || ! sudo test -e "/mnt/whisplay-root${chatbot_exec_path}"; then
            echo "run_chatbot.sh from chatbot.service is missing: ${chatbot_exec_path:-<empty>}" >&2
            printf 'Debug missing path (escaped): [%q]\n' "/mnt/whisplay-root${chatbot_exec_path}" >&2
            echo "Debug: /home layout in image" >&2
            sudo find /mnt/whisplay-root/home -maxdepth 4 -mindepth 1 -print || true
            echo "Debug: run_chatbot.sh candidates" >&2
            sudo find /mnt/whisplay-root -maxdepth 6 -type f -name run_chatbot.sh -print || true
            echo "Debug: ls on expected target" >&2
            sudo ls -la "/mnt/whisplay-root${chatbot_exec_path}" >&2 || true
            sudo cat /mnt/whisplay-root/etc/systemd/system/chatbot.service >&2 || true
            exit 1
          fi

          if [ -L /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants/whisplay-chatbot-register.service ] || [ -e /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants/whisplay-chatbot-register.service ]; then
            true
          else
            echo "whisplay-chatbot-register.service is not enabled in the image" >&2
            sudo ls -la /mnt/whisplay-root/etc/systemd/system
            sudo ls -la /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants || true
            exit 1
          fi

          if [ -L /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants/whisplay-daemon.service ] || [ -e /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants/whisplay-daemon.service ]; then
            true
          else
            echo "whisplay-daemon.service is not enabled in the image" >&2
            sudo ls -la /mnt/whisplay-root/etc/systemd/system
            sudo ls -la /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants || true
            exit 1
          fi

          if [ -L /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants/whisplay-expand-rootfs.service ] || [ -e /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants/whisplay-expand-rootfs.service ]; then
            true
          else
            echo "whisplay-expand-rootfs.service is not enabled in the image" >&2
            sudo ls -la /mnt/whisplay-root/etc/systemd/system
            sudo ls -la /mnt/whisplay-root/etc/systemd/system/multi-user.target.wants || true
            exit 1
          fi

          if ! sudo grep -Eq '^SupplementaryGroups=.*(^|[[:space:]])netdev($|[[:space:]])' /mnt/whisplay-root/etc/systemd/system/whisplay-daemon.service; then
            echo "whisplay-daemon.service is missing netdev in SupplementaryGroups" >&2
            sudo cat /mnt/whisplay-root/etc/systemd/system/whisplay-daemon.service >&2
            exit 1
          fi

          if ! sudo grep -q 'org.freedesktop.NetworkManager.' /mnt/whisplay-root/etc/polkit-1/rules.d/49-whisplay-networkmanager.rules; then
            echo "NetworkManager polkit rule is missing expected action prefix" >&2
            sudo cat /mnt/whisplay-root/etc/polkit-1/rules.d/49-whisplay-networkmanager.rules >&2
            exit 1
          fi

          sudo ls -la /mnt/whisplay-root/etc/whisplay-image
          rm -f "$raw_img"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: basic-image-release-assets
          path: release-assets/*

  publish-release:
    needs: build-image
    if: needs.build-image.outputs.prerelease == 'false' || needs.build-image.outputs.source_branch == 'develop'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync prerelease tag
        if: needs.build-image.outputs.prerelease == 'true'
        env:
          RELEASE_TAG: ${{ needs.build-image.outputs.release_tag }}
        run: |
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/${RELEASE_TAG}" --force

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: basic-image-release-assets
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.build-image.outputs.prerelease }}
          RELEASE_NAME: ${{ needs.build-image.outputs.release_name }}
          RELEASE_TAG: ${{ needs.build-image.outputs.release_tag }}
        run: |
          release_flags=(--title "$RELEASE_NAME" --generate-notes --verify-tag)
          if [ "$PRERELEASE" = "true" ]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            while IFS= read -r asset_name; do
              [ -n "$asset_name" ] || continue
              gh release delete-asset "$RELEASE_TAG" "$asset_name" --yes
            done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME"
            if [ "$PRERELEASE" = "true" ]; then
              gh release edit "$RELEASE_TAG" --prerelease
            fi
          else
            gh release create "$RELEASE_TAG" release-assets/* "${release_flags[@]}"
          fi

  notify-discord:
    needs:
      - build-image
      - publish-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post to Discord #changelog
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-image.outputs.release_tag }}
        run: |
          set -euo pipefail

          release_json="$(gh release view "$RELEASE_TAG" --json body,isPrerelease,name,url)"
          TAG="$RELEASE_TAG"
          NAME="$(jq -r '.name // empty' <<<"$release_json")"
          URL="$(jq -r '.url // empty' <<<"$release_json")"
          PRERELEASE="$(jq -r '.isPrerelease' <<<"$release_json")"
          BODY="$(jq -r '.body // empty' <<<"$release_json")"

          if [ -z "$NAME" ]; then
            NAME="$TAG"
          fi
          if [ -z "$URL" ]; then
            URL="https://github.com/${{ github.repository }}/releases/tag/$TAG"
          fi
          if [ -z "$BODY" ]; then
            PREV_TAG="$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)"
            if [ -n "$PREV_TAG" ]; then
              BODY="$(git log --pretty=format:"- %s (%an)" "$PREV_TAG..$TAG" 2>/dev/null | head -30 || true)"
            else
              BODY="$(git log --pretty=format:"- %s (%an)" "$TAG" 2>/dev/null | head -15 || true)"
            fi
          fi
          if [ -z "$BODY" ]; then
            BODY="Basic image release is available."
          fi

          BODY="${BODY:0:1800}"

          if [ "$PRERELEASE" = "true" ] || echo "$TAG" | grep -qiE '(alpha|beta|rc|dev)'; then
            COLOR=16776960
            BADGE="Pre-release"
          else
            COLOR=3066993
            BADGE="New Release"
          fi

          PAYLOAD="$(jq -n \
            --arg title "$BADGE: $NAME" \
            --arg url "$URL" \
            --arg desc "$BODY" \
            --argjson color "$COLOR" \
            --arg tag "$TAG" \
            --arg repo "${{ github.repository }}" \
            --arg avatar "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" \
            '{
              username: "GitHub Release",
              avatar_url: $avatar,
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: $color,
                fields: [
                  { name: "Tag", value: $tag, inline: true },
                  { name: "Repository", value: $repo, inline: true }
                ],
                timestamp: now | todate
              }]
            }')"

          HTTP_CODE="$(curl -s -o /tmp/discord_response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Posted to Discord #changelog (HTTP $HTTP_CODE)"
          else
            echo "Failed to post (HTTP $HTTP_CODE)" >&2
            cat /tmp/discord_response.txt >&2
            exit 1
          fi

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whisplay Web Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="screen">
      <div class="screen-inner">
        <div class="header">
          <div class="status-bar">
            <div class="status" id="statusText">starting</div>
            <div class="status-icons">
              <img class="status-icon" id="imageIcon" src="/img/image.png" alt="image" />
              <img class="status-icon" id="ragIcon" src="/img/rag.png" alt="rag" />
              <img class="status-icon" id="vpnIcon" src="/img/vpn.png" alt="vpn" />
              <img class="status-icon" id="netIcon" src="/img/wifi.png" alt="network" />
              <div class="battery">
                <div class="battery-shell">
                  <div class="battery-fill" id="batteryFill"></div>
                </div>
                <span id="batteryText">--%</span>
              </div>
            </div>
          </div>
          <div class="emoji" id="emojiText">...</div>
        </div>
        <div class="music-progress" id="musicProgress">
          <div class="music-progress-times">
            <span id="musicElapsed">0:00</span>
            <span id="musicTotal">0:00</span>
          </div>
          <div class="music-progress-track">
            <div class="music-progress-fill" id="musicFill"></div>
          </div>
        </div>
        <div class="body">
          <div class="text-viewport">
            <div class="text-content" id="textContent"></div>
          </div>
        </div>
        <div class="image-layer" id="imageLayer">
          <img id="imageDisplay" alt="display" />
        </div>
        <div class="dim" id="dim"></div>
      </div>
    </div>
    <div class="side">
      <div class="card">
        <div class="title">RGB LED</div>
        <div class="led" id="led"></div>
        <div class="status-text" id="ledText">--</div>
      </div>
      <div class="card">
        <div class="title">Button</div>
        <button class="button" id="btn">PRESS</button>
        <div class="status-text" id="btnText">released</div>
      </div>
      <div class="card" id="webAudioCard" style="display:none">
        <div class="title">Web Audio</div>
        <div class="status-text" id="micIndicator" style="display:none;color:#f55">● REC</div>
        <div class="status-text" id="camIndicator" style="display:none;color:#5af">● CAM</div>
      </div>
      <div class="card" id="textInputCard">
        <div class="title">Text Input</div>
        <div class="text-input-wrap">
          <textarea id="textInput" placeholder="Type a message..." rows="6"></textarea>
          <button id="textSendBtn" title="Send">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
